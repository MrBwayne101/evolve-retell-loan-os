[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "loan-os"
version = "0.1.0"
description = "Evolve Loan OS contract layer and fake bakeoff harness."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "aiohttp>=3.9.0",
  "httpx>=0.27.0",
  "jsonschema>=4.23.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"
